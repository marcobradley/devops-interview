apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: "{{ .Values.rabbitmq.user }}"
            - name: RABBITMQ_DEFAULT_PASS
              value: "{{ .Values.rabbitmq.pw }}"
          ports:
            - containerPort: !!int "{{ .Values.rabbitmq.queue_port }}"
            - containerPort: !!int "{{ .Values.rabbitmq.mgmt_port }}"
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: !!int "{{ .Values.rabbitmq.queue_port }}"
      targetPort: !!int "{{ .Values.rabbitmq.queue_port }}"
    - name: management
      port: !!int "{{ .Values.rabbitmq.mgmt_port }}"
      targetPort: !!int "{{ .Values.rabbitmq.mgmt_port }}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Values.api.name }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "{{ .Values.api.name }}"
  template:
    metadata:
      labels:
        app: "{{ .Values.api.name }}"
    spec:
      containers:
      - image: "ghcr.io/tagup/devops-interview:latest"
        name: "{{ .Values.api.name }}"
        command:
        - /app/entrypoints/docker-entrypoint.sh
        args:
        - api
        - --workers
        - "1"
        ports:
        - containerPort: !!int "{{ .Values.api.container_port }}"
        env:
          - name: AGGREGATE_QUEUE
            value: "{{ .Values.api.aggregate_queue }}"
          - name: INCREMENT_QUEUE
            value: "{{ .Values.api.increment_queue }}"
          - name: DATABASE_URI
            value: "postgresql+psycopg://{{ .Values.postgres.user }}:{{ .Values.postgres.pw }}@postgres:{{ .Values.postgres.port }}/postgres"
          - name: REDIS_URI
            value: "redis://redis:{{ .Values.redis.port }}/0"
          - name: CELERY_BROKER_URL
            value: "amqp://{{ .Values.rabbitmq.user }}:{{ .Values.rabbitmq.pw }}@rabbitmq:{{ .Values.rabbitmq.queue_port }}/"
        resources:
          requests:
            memory: "512Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: "{{ .Values.api.name }}-service"
spec:
  ports:
  - name: http
    port: !!int "{{ .Values.api.frontend_port }}"
    protocol: TCP
    targetPort: !!int "{{ .Values.api.container_port }}"
  selector:
    app: "{{ .Values.api.name }}"
status:
  loadBalancer: {}